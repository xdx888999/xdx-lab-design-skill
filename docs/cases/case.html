<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>真实案例详情 — xdx-lab Design Style Skill</title>
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800;900&family=Noto+Sans+SC:wght@400;500;700;900&family=Noto+Serif+SC:wght@500;700;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="cases.css">
</head>
<body>
<a class="top-link" href="index.html">← 返回案例</a>
<main class="detail-shell" id="case-root"></main>

<script src="case-data.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const selectedId = params.get("id") || window.designCases[0].id;
  const current = window.designCases.find(item => item.id === selectedId) || window.designCases[0];
  const root = document.querySelector("#case-root");

  document.title = `${current.title} — 真实案例`;
  root.style.setProperty("--case-accent", current.accent);
  root.style.setProperty("--case-surface", current.surface);
  root.style.setProperty("--case-ink", current.ink);

  function list(items) {
    return `<ul class="list">${items.map(item => `<li>${item}</li>`).join("")}</ul>`;
  }

  function renderArtifact(id) {
    const artifacts = {
      "tang-museum-poster": `
        <div class="artifact-frame poster-artifact">
          <div class="poster-sheet">
            <div class="poster-mark">唐</div>
            <div class="poster-vessel" aria-hidden="true"></div>
            <div class="poster-copy">
              <p class="poster-date">2026.09.18 — 2027.01.04 · XDX CITY MUSEUM</p>
              <h2>器以载唐</h2>
              <p>金银器、三彩、石青壁画残片与长安生活想象</p>
            </div>
            <div class="poster-footer">
              <span>盛唐器物展</span>
              <span>一层 · 特展厅 A</span>
            </div>
          </div>
        </div>
      `,
      "climate-ops-dashboard": `
        <div class="artifact-frame dashboard-artifact">
          <div class="dash-top">
            <div>
              <span class="dash-kicker">Carbon Ops · Live</span>
              <h2>碳排运营监控驾驶舱</h2>
            </div>
            <div class="dash-status">今日数据同步 98.7%</div>
          </div>
          <div class="dash-kpis">
            <div><strong>42.8t</strong><span>今日碳排</span></div>
            <div><strong>-11.4%</strong><span>较基线下降</span></div>
            <div><strong>7</strong><span>产线异常</span></div>
            <div><strong>83%</strong><span>年度目标</span></div>
          </div>
          <div class="dash-main">
            <section class="dash-chart">
              <div class="chart-grid"></div>
              <svg viewBox="0 0 680 260" role="img" aria-label="碳排趋势图">
                <polyline points="20,190 110,160 190,174 278,120 360,132 450,86 540,104 650,58" fill="none" stroke="#39C5CF" stroke-width="5"/>
                <polyline points="20,220 110,204 190,198 278,178 360,170 450,150 540,142 650,126" fill="none" stroke="#3FB950" stroke-width="3" stroke-dasharray="8 8"/>
              </svg>
            </section>
            <aside class="dash-alerts">
              <h3>异常队列</h3>
              <p><b>Line 07</b><span>蒸汽流量偏高 · 12 分钟</span></p>
              <p><b>Line 12</b><span>夜班能耗超阈值 · 34 分钟</span></p>
              <p><b>Boiler B</b><span>排放因子待复核 · 1 小时</span></p>
            </aside>
          </div>
        </div>
      `,
      "medical-report": `
        <div class="artifact-frame report-artifact">
          <div class="report-page">
            <header>
              <div>
                <span>Cardiac Rehab Follow-up</span>
                <h2>远程心脏康复报告</h2>
              </div>
              <strong>中风险 · 需复查</strong>
            </header>
            <div class="report-summary">
              <div><b>患者</b><span>匿名样例 · 58 岁</span></div>
              <div><b>依从性</b><span>86%</span></div>
              <div><b>静息心率</b><span>72 bpm</span></div>
              <div><b>血压均值</b><span>126/78</span></div>
            </div>
            <section class="report-chart">
              <h3>训练负荷与心率趋势</h3>
              <svg viewBox="0 0 720 220" role="img" aria-label="训练趋势图">
                <rect x="42" y="152" width="46" height="36" fill="#BFE3F5"/>
                <rect x="128" y="126" width="46" height="62" fill="#BFE3F5"/>
                <rect x="214" y="112" width="46" height="76" fill="#BFE3F5"/>
                <rect x="300" y="92" width="46" height="96" fill="#BFE3F5"/>
                <rect x="386" y="118" width="46" height="70" fill="#BFE3F5"/>
                <rect x="472" y="82" width="46" height="106" fill="#BFE3F5"/>
                <rect x="558" y="72" width="46" height="116" fill="#BFE3F5"/>
                <polyline points="42,128 128,118 214,132 300,96 386,108 472,84 558,92 648,74" fill="none" stroke="#0288D1" stroke-width="4"/>
              </svg>
            </section>
            <section class="doctor-note">
              <h3>医生建议</h3>
              <p>继续保持每周 4 次低至中等强度训练；若夜间心率连续 3 天高于个人基线 12%，建议复查用药与睡眠状态。</p>
            </section>
          </div>
        </div>
      `,
      "boutique-hotel-booking": `
        <div class="artifact-frame hotel-artifact">
          <section class="hotel-hero">
            <nav><b>VALLEY HOUSE</b><span>Rooms</span><span>Season</span><span>Dining</span></nav>
            <div>
              <p>Autumn Mountain Retreat</p>
              <h2>住进山谷雾气抵达前的房间</h2>
            </div>
          </section>
          <form class="booking-bar">
            <label>入住<span>10月18日</span></label>
            <label>离店<span>10月21日</span></label>
            <label>人数<span>2 位成人</span></label>
            <button type="button">查询房型</button>
          </form>
          <div class="room-grid">
            <article><div class="room-img warm"></div><h3>溪谷露台房</h3><p>42㎡ · 私享露台 · 含早餐</p><strong>¥1,680 / 晚</strong></article>
            <article><div class="room-img moss"></div><h3>山景套房</h3><p>68㎡ · 壁炉客厅 · 免费接驳</p><strong>¥2,860 / 晚</strong></article>
          </div>
        </div>
      `,
      "fintech-onboarding-app": `
        <div class="artifact-frame app-artifact">
          ${["身份验证", "企业资料", "收款账户", "合规确认"].map((title, index) => `
            <section class="phone-screen">
              <div class="phone-status">9:41 <span>${index + 1}/4</span></div>
              <h2>${title}</h2>
              <p>${["上传证件并进行人脸核验", "补充营业执照与经营地区", "选择币种并绑定银行账户", "确认资金用途与风险声明"][index]}</p>
              <div class="progress"><i style="width:${(index + 1) * 25}%"></i></div>
              <div class="form-card">
                <span>${["身份证正反面", "公司英文名", "USD 收款账户", "预计月收款额"][index]}</span>
                <strong>${["已通过", "XDX TRADE LTD", "•••• 7284", "50k — 100k"][index]}</strong>
              </div>
              <button type="button">${index === 3 ? "提交审核" : "继续"}</button>
            </section>
          `).join("")}
        </div>
      `,
      "ai-startup-pitch": `
        <div class="artifact-frame deck-artifact">
          ${[
            ["01", "Code teams are drowning in context", "研发上下文分散在 11 个工具中"],
            ["02", "One workspace for agentic engineering", "任务、代码、评审和知识统一进入工作流"],
            ["03", "Product demo", "从需求到 PR 的 6 分钟闭环"],
            ["04", "Traction", "42 teams · 18% weekly active growth"],
            ["05", "Market", "$18B engineering productivity spend"],
            ["06", "Business model", "Seat + usage based pricing"],
            ["07", "Team", "Infra, design systems, developer tools"],
            ["08", "Seed ask", "$2.4M to reach 1,000 paid teams"]
          ].map(slide => `
            <section class="pitch-slide">
              <span>${slide[0]}</span>
              <h2>${slide[1]}</h2>
              <p>${slide[2]}</p>
            </section>
          `).join("")}
        </div>
      `,
      "fashion-drop-commerce": `
        <div class="artifact-frame commerce-artifact">
          <header><b>ATELIER 09</b><span>DROP 04 · 12 PIECES</span></header>
          <section class="commerce-hero">
            <div class="look look-a"></div>
            <div class="commerce-copy">
              <p>CAPSULE SERIES</p>
              <h2>衣橱里的红色断句</h2>
              <span>羊毛混纺短外套 · 限量 120 件</span>
              <div class="size-row"><button>XS</button><button>S</button><button>M</button><button disabled>L</button></div>
              <button class="buy" type="button">加入购物袋 · ¥2,980</button>
            </div>
            <div class="look look-b"></div>
          </section>
        </div>
      `,
      "opensource-devtool-launch": `
        <div class="artifact-frame dev-artifact">
          <nav><b>Patchline</b><span>Docs</span><span>GitHub</span><span>Releases</span></nav>
          <section class="dev-hero">
            <div>
              <p>OPEN SOURCE CLI</p>
              <h2>Ship safer patches from your terminal.</h2>
              <div class="terminal"><span>$</span> npx patchline scan --fix</div>
            </div>
            <aside>
              <h3>Why teams adopt it</h3>
              <p>Static checks, review notes, changelog drafts and release validation in one local command.</p>
            </aside>
          </section>
          <div class="dev-grid">
            <article><b>2.1k</b><span>GitHub stars</span></article>
            <article><b>34s</b><span>median scan</span></article>
            <article><b>0</b><span>cloud upload required</span></article>
          </div>
        </div>
      `
    };

    return artifacts[id] || "";
  }

  root.innerHTML = `
    <header class="detail-hero">
      <div class="detail-inner">
        <div class="detail-kicker">${current.type} · ${current.style}</div>
        <h1 class="detail-title">${current.title}</h1>
        <p class="detail-summary">${current.summary}</p>
        <div class="case-nav">
          <a href="index.html">全部案例</a>
          <a href="../index.html">返回画廊</a>
        </div>
      </div>
    </header>

    <section class="artifact-section" id="artifact" aria-labelledby="artifact-title">
      <div class="artifact-heading">
        <div>
          <span>Actual Deliverable</span>
          <h2 id="artifact-title">真实成品样张</h2>
        </div>
        <p>这里展示的是该案例应该交付给客户或团队的实际页面/海报/报告/界面，而不是设计说明。</p>
      </div>
      ${renderArtifact(current.id)}
    </section>

    <section class="detail-grid">
      <div class="stack">
        <article class="panel">
          <h2>真实业务简报</h2>
          <p>${current.brief}</p>
        </article>

        <article class="panel">
          <h2>版式与交互策略</h2>
          ${list(current.layout)}
        </article>

        <article class="panel">
          <h2>可复用 Prompt</h2>
          <div class="prompt-box">${current.prompt}</div>
        </article>
      </div>

      <aside class="stack">
        <article class="panel">
          <h3>目标用户</h3>
          <p>${current.audience}</p>
        </article>

        <article class="panel">
          <h3>交付物</h3>
          ${list(current.deliverables)}
        </article>

        <article class="panel">
          <h3>关键 Token</h3>
          <div class="token-row">
            ${current.tokens.map(token => `<span class="token">${token}</span>`).join("")}
          </div>
        </article>

        <article class="panel">
          <h3>质量标准</h3>
          ${list(current.quality)}
        </article>

        <article class="panel">
          <h3>方法组合</h3>
          <div class="token-row">
            <span class="token">${current.style}</span>
            <span class="token">${current.master}</span>
          </div>
        </article>
      </aside>
    </section>
  `;
</script>
</body>
</html>
