<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>田中一光 — 现代艺术展海报</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { margin: 0; background: #E8E4DF; display: flex; align-items: center; justify-content: center; min-height: 100vh; }

  .poster {
    position: relative; width: 680px; min-height: 960px; overflow: hidden;
    background: #FAFAF8;
    color: #1A1A1A;
    font-family: "Noto Sans SC", "Inter", sans-serif;
  }

  .content { position: relative; z-index: 2; padding: 48px; height: 100%; }

  /* ── 几何装饰 ── */
  .geo-circle-red {
    position: absolute; top: 80px; right: -60px; z-index: 1;
    width: 320px; height: 320px; border-radius: 50%;
    background: #D93025;
  }
  .geo-circle-blue {
    position: absolute; bottom: 160px; left: -40px; z-index: 1;
    width: 200px; height: 200px; border-radius: 50%;
    background: #1A73E8;
  }
  .geo-rect-yellow {
    position: absolute; top: 380px; left: 50px; z-index: 1;
    width: 120px; height: 120px;
    background: #F9AB00;
  }
  .geo-triangle {
    position: absolute; bottom: 80px; right: 80px; z-index: 1;
    width: 0; height: 0;
    border-left: 60px solid transparent;
    border-right: 60px solid transparent;
    border-bottom: 100px solid #1A1A1A;
  }
  .geo-line-h {
    position: absolute; top: 520px; left: 0; right: 0; z-index: 1;
    height: 3px; background: #1A1A1A;
  }
  .geo-line-v {
    position: absolute; top: 0; bottom: 0; left: 280px; z-index: 1;
    width: 2px; background: rgba(26,26,26,0.1);
  }
  .geo-half-circle {
    position: absolute; top: 540px; right: 0; z-index: 1;
    width: 140px; height: 70px;
    background: #34A853;
    border-radius: 0 0 140px 140px;
  }

  /* ── 排版 ── */
  .top-label {
    font-size: 10px; font-weight: 900; letter-spacing: 0.3em; text-transform: uppercase;
    color: #D93025; position: relative; z-index: 3; margin-bottom: 6px;
  }
  .top-venue {
    font-size: 12px; font-weight: 400; letter-spacing: 0.08em; color: #666;
    position: relative; z-index: 3;
  }

  .title-block {
    position: relative; z-index: 3;
    margin-top: 120px;
  }
  .title-jp {
    font-size: 88px; font-weight: 900; line-height: 1.05; letter-spacing: -0.02em;
    color: #1A1A1A;
  }
  .title-en {
    font-family: "Inter", sans-serif;
    font-size: 14px; font-weight: 900; letter-spacing: 0.2em; text-transform: uppercase;
    color: #666; margin-top: 16px;
  }
  .title-sub {
    font-size: 16px; font-weight: 400; color: #999; margin-top: 8px; letter-spacing: 0.06em;
  }

  .mid-block {
    position: relative; z-index: 3;
    margin-top: 180px;
  }
  .artists {
    display: flex; flex-direction: column; gap: 6px;
  }
  .artist-name {
    font-size: 18px; font-weight: 700; letter-spacing: 0.04em;
  }
  .artist-name span { font-size: 12px; font-weight: 400; color: #999; margin-left: 8px; }

  .bottom-block {
    position: absolute; bottom: 48px; left: 48px; right: 48px; z-index: 3;
    display: flex; justify-content: space-between; align-items: flex-end;
  }
  .date-block {}
  .date-big {
    font-family: "Inter", sans-serif;
    font-size: 48px; font-weight: 900; line-height: 1; letter-spacing: -0.02em;
  }
  .date-range {
    font-size: 12px; color: #666; letter-spacing: 0.08em; margin-top: 6px;
  }
  .venue-info {
    text-align: right; font-size: 11px; color: #999; line-height: 1.8; letter-spacing: 0.04em;
  }

  /* 色块标记 */
  .color-bar {
    position: absolute; bottom: 0; left: 0; right: 0; z-index: 1;
    display: flex; height: 8px;
  }
  .color-bar div { flex: 1; }
  .cb-1 { background: #D93025; }
  .cb-2 { background: #F9AB00; }
  .cb-3 { background: #1A73E8; }
  .cb-4 { background: #34A853; }
  .cb-5 { background: #1A1A1A; }

  /* 浮动按钮 */
  .back { position: fixed; top: 20px; left: 20px; z-index: 100; padding: 8px 18px; font-size: 12px; font-weight: 700; font-family: "Inter", sans-serif; color: #1A1A1A; background: rgba(255,255,255,0.85); backdrop-filter: blur(10px); border: 1px solid rgba(0,0,0,0.1); border-radius: 30px; text-decoration: none; }
  .tag { position: fixed; top: 20px; right: 20px; z-index: 100; padding: 8px 14px; font-size: 10px; font-weight: 900; font-family: "Inter", sans-serif; color: #D93025; background: rgba(255,255,255,0.85); backdrop-filter: blur(10px); border: 1px solid rgba(217,48,37,0.2); border-radius: 30px; letter-spacing: 0.1em; }
</style>
</head>
<body>
<a class="back" href="../index.html">← 画廊</a>
<span class="tag">POSTER · 田中一光</span>

<div class="poster">
  <!-- 几何元素 -->
  <div class="geo-circle-red"></div>
  <div class="geo-circle-blue"></div>
  <div class="geo-rect-yellow"></div>
  <div class="geo-triangle"></div>
  <div class="geo-line-h"></div>
  <div class="geo-line-v"></div>
  <div class="geo-half-circle"></div>

  <div class="content">
    <div class="top-label">Exhibition</div>
    <div class="top-venue">东京都现代美术馆 Museum of Contemporary Art Tokyo</div>

    <div class="title-block">
      <div class="title-jp">形と<br>色の<br>対話</div>
      <div class="title-en">Dialogue of Form and Color</div>
      <div class="title-sub">日本现代平面设计的几何探索</div>
    </div>

    <div class="mid-block">
      <div class="artists">
        <div class="artist-name">田中一光 <span>Ikko Tanaka</span></div>
        <div class="artist-name">福田繁雄 <span>Shigeo Fukuda</span></div>
        <div class="artist-name">永井一正 <span>Kazumasa Nagai</span></div>
        <div class="artist-name">横尾忠則 <span>Tadanori Yokoo</span></div>
      </div>
    </div>

    <div class="bottom-block">
      <div class="date-block">
        <div class="date-big">2025</div>
        <div class="date-range">10.01 — 2026.01.15</div>
      </div>
      <div class="venue-info">
        MOT 东京都现代美术馆<br>
        东京都江东区三好 4-1-1<br>
        10:00 – 18:00 · 周一休馆<br>
        一般 ¥1,500 / 学生 ¥800
      </div>
    </div>
  </div>

  <div class="color-bar">
    <div class="cb-1"></div><div class="cb-2"></div><div class="cb-3"></div><div class="cb-4"></div><div class="cb-5"></div>
  </div>
</div>
</body>
</html>
