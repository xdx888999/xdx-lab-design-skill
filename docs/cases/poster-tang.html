<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>盛唐华彩 — 原研哉方法海报</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Noto+Sans+SC:wght@300;400;500&family=Noto+Serif+SC:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --paper: #FBFAF5;
    --paper-fiber: #E8E1D2;
    --ink: #2F2A24;
    --muted: #7A7166;
    --gold: #C9A84C;
    --bright-gold: #E8C456;
    --cinnabar: #C43B2A;
    --lapis: #2B5BA8;
    --malachite: #2D7A5A;
    --jade-white: #E8EDE5;
  }

  body {
    min-height: 100vh;
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(circle at 20% 8%, rgba(201, 168, 76, 0.12), transparent 30%),
      linear-gradient(180deg, #EEE7D8, #DDD2BE);
    font-family: "Noto Sans SC", sans-serif;
  }

  .poster {
    position: relative;
    width: min(680px, calc(100vw - 28px));
    min-height: 960px;
    overflow: hidden;
    background:
      radial-gradient(circle at 52% 35%, rgba(201, 168, 76, 0.055), transparent 34%),
      linear-gradient(90deg, rgba(47, 42, 36, 0.018) 1px, transparent 1px),
      linear-gradient(180deg, rgba(47, 42, 36, 0.014) 1px, transparent 1px),
      var(--paper);
    background-size: auto, 64px 64px, 64px 64px, auto;
    color: var(--ink);
    box-shadow: 0 30px 90px rgba(47, 42, 36, 0.2);
    isolation: isolate;
  }

  .poster::before {
    position: absolute;
    inset: 0;
    z-index: 0;
    content: "";
    background:
      radial-gradient(circle at 18% 22%, rgba(122, 113, 102, 0.06) 0 1px, transparent 1.5px),
      radial-gradient(circle at 72% 42%, rgba(122, 113, 102, 0.05) 0 1px, transparent 1.5px),
      radial-gradient(circle at 40% 80%, rgba(122, 113, 102, 0.045) 0 1px, transparent 1.5px);
    background-size: 22px 26px, 31px 29px, 27px 33px;
    opacity: 0.48;
    pointer-events: none;
  }

  .poster::after {
    position: absolute;
    inset: 34px;
    z-index: 1;
    content: "";
    border: 1px solid rgba(201, 168, 76, 0.2);
    pointer-events: none;
  }

  .back,
  .tag {
    position: fixed;
    z-index: 20;
    border: 1px solid rgba(47, 42, 36, 0.12);
    background: rgba(251, 250, 245, 0.82);
    color: var(--ink);
    backdrop-filter: blur(10px);
    text-decoration: none;
  }

  .back {
    top: 20px;
    left: 20px;
    padding: 8px 18px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 500;
  }

  .tag {
    top: 20px;
    right: 20px;
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.16em;
  }

  .content {
    position: relative;
    z-index: 3;
    min-height: 960px;
    padding: 58px 58px 54px;
    display: grid;
    grid-template-rows: auto 1fr auto;
  }

  /* 用压印感替代强装饰：唐代宝相花只作为被纸吸收的记忆。 */
  .embossed-lotus {
    position: absolute;
    left: 50%;
    top: 208px;
    z-index: 1;
    width: 360px;
    height: 360px;
    transform: translateX(-50%);
    opacity: 0.24;
    border-radius: 50%;
    background:
      radial-gradient(circle, transparent 0 20%, rgba(201, 168, 76, 0.32) 21% 23%, transparent 24%),
      conic-gradient(from 22deg,
        transparent 0 10deg,
        rgba(201, 168, 76, 0.32) 10deg 18deg,
        transparent 18deg 30deg);
    clip-path: polygon(
      50% 0%, 57% 24%, 76% 10%, 70% 34%, 96% 28%, 78% 46%,
      100% 50%, 78% 54%, 96% 72%, 70% 66%, 76% 90%, 57% 76%,
      50% 100%, 43% 76%, 24% 90%, 30% 66%, 4% 72%, 22% 54%,
      0% 50%, 22% 46%, 4% 28%, 30% 34%, 24% 10%, 43% 24%
    );
    filter: drop-shadow(0 1px 0 rgba(255,255,255,0.82)) drop-shadow(0 -1px 0 rgba(47,42,36,0.08));
    pointer-events: none;
  }

  .quiet-axis {
    position: absolute;
    left: 96px;
    top: 58px;
    bottom: 54px;
    z-index: 2;
    width: 1px;
    background: linear-gradient(180deg, transparent, rgba(201, 168, 76, 0.42) 16%, rgba(201, 168, 76, 0.18) 78%, transparent);
  }

  .top-meta {
    position: relative;
    z-index: 4;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 36px;
  }

  .method-note {
    max-width: 260px;
    color: var(--muted);
    font-size: 12px;
    font-weight: 300;
    line-height: 1.9;
    letter-spacing: 0.06em;
  }

  .seal {
    width: 54px;
    height: 54px;
    display: grid;
    place-items: center;
    border: 1px solid var(--cinnabar);
    color: var(--cinnabar);
    font-family: "Noto Serif SC", serif;
    font-size: 14px;
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: 0.08em;
  }

  .main-field {
    position: relative;
    z-index: 4;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 90px 0 124px;
  }

  .period {
    margin-left: 70px;
    color: var(--gold);
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.34em;
  }

  .title {
    margin-top: 26px;
    margin-left: 68px;
    color: var(--ink);
    font-family: "Noto Serif SC", serif;
    font-size: 74px;
    font-weight: 600;
    line-height: 1.06;
    letter-spacing: 0.12em;
  }

  .title span {
    display: block;
  }

  .subtitle {
    width: min(360px, 78%);
    margin-top: 34px;
    margin-left: 72px;
    color: var(--muted);
    font-size: 15px;
    font-weight: 300;
    line-height: 2.1;
    letter-spacing: 0.12em;
  }

  .color-breath {
    position: absolute;
    right: 72px;
    top: 52%;
    z-index: 5;
    display: flex;
    flex-direction: column;
    gap: 12px;
    transform: translateY(-50%);
  }

  .color-breath span {
    width: 7px;
    height: 38px;
  }

  .gold { background: var(--gold); }
  .red { background: var(--cinnabar); }
  .blue { background: var(--lapis); }
  .green { background: var(--malachite); }

  .bottom-meta {
    position: relative;
    z-index: 4;
    display: grid;
    grid-template-columns: 1fr 1.2fr;
    gap: 36px;
    align-items: end;
  }

  .date {
    border-top: 1px solid rgba(201, 168, 76, 0.48);
    padding-top: 18px;
  }

  .year {
    color: var(--ink);
    font-family: "Cormorant Garamond", serif;
    font-size: 54px;
    font-weight: 600;
    line-height: 0.96;
    letter-spacing: 0.02em;
  }

  .range {
    margin-top: 10px;
    color: var(--muted);
    font-size: 12px;
    font-weight: 300;
    letter-spacing: 0.18em;
  }

  .venue {
    padding: 20px 0 0 26px;
    border-left: 1px solid rgba(201, 168, 76, 0.48);
  }

  .venue-title {
    color: var(--ink);
    font-family: "Noto Serif SC", serif;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.1em;
  }

  .venue-copy {
    margin-top: 12px;
    color: var(--muted);
    font-size: 12px;
    font-weight: 300;
    line-height: 2;
    letter-spacing: 0.08em;
  }

  .caption-line {
    position: absolute;
    right: 58px;
    bottom: 180px;
    z-index: 4;
    color: rgba(122, 113, 102, 0.76);
    font-size: 10px;
    font-weight: 300;
    letter-spacing: 0.18em;
    writing-mode: vertical-rl;
  }

  .tiny-gold {
    position: absolute;
    left: 91px;
    top: 514px;
    z-index: 5;
    width: 11px;
    height: 11px;
    transform: rotate(45deg);
    background: var(--bright-gold);
  }

  @media (max-width: 720px) {
    body { align-items: flex-start; padding: 14px 0; }
    .poster { min-height: 900px; }
    .content { min-height: 900px; padding: 48px 36px 44px; }
    .quiet-axis { left: 64px; }
    .period, .title, .subtitle { margin-left: 48px; }
    .title { font-size: clamp(52px, 15vw, 72px); }
    .subtitle { width: min(340px, calc(100% - 70px)); }
    .bottom-meta { grid-template-columns: 1fr; gap: 24px; }
    .venue { padding-left: 0; border-left: 0; border-top: 1px solid rgba(201, 168, 76, 0.42); }
    .color-breath { right: 42px; }
    .embossed-lotus { width: 300px; height: 300px; top: 220px; }
    .caption-line { right: 36px; bottom: 290px; }
  }
</style>
</head>
<body>
<a class="back" href="../index.html">← 画廊</a>
<span class="tag">原研哉方法 · 唐代色</span>

<main class="poster" aria-label="盛唐华彩原研哉方法海报">
  <div class="quiet-axis" aria-hidden="true"></div>
  <div class="embossed-lotus" aria-hidden="true"></div>
  <div class="tiny-gold" aria-hidden="true"></div>
  <div class="caption-line">金 · 朱砂 · 青金石 · 孔雀绿</div>

  <section class="content">
    <header class="top-meta">
      <p class="method-note">以空白承载盛唐的颜色。纹样不喧哗，只在纸面上留下很轻的触感。</p>
      <div class="seal">唐<br>色</div>
    </header>

    <section class="main-field" aria-labelledby="poster-title">
      <div class="period">六一八 至 九〇七</div>
      <h1 class="title" id="poster-title"><span>盛唐</span><span>华彩</span></h1>
      <p class="subtitle">长安丝路乐舞与敦煌色彩展。把金、朱砂、青金石与孔雀绿，放回一张安静的纸上。</p>
      <div class="color-breath" aria-hidden="true">
        <span class="gold"></span>
        <span class="red"></span>
        <span class="blue"></span>
        <span class="green"></span>
      </div>
    </section>

    <footer class="bottom-meta">
      <div class="date">
        <div class="year">2026</div>
        <div class="range">03.18 — 06.30</div>
      </div>
      <div class="venue">
        <div class="venue-title">大明宫遗址博物馆</div>
        <div class="venue-copy">
          含元殿东侧展厅<br>
          壁画摹本 · 唐三彩 · 胡旋乐舞 · 丝路器物<br>
          每日 09:00 至 18:00 · 周一闭馆
        </div>
      </div>
    </footer>
  </section>
</main>
</body>
</html>
