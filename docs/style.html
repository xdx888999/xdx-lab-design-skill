<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>设计风格详情 — xdx-lab-design-skill</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Inter:wght@400;500;600;700;800;900&family=Noto+Serif+SC:wght@400;600;700&family=Playfair+Display:wght@400;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #F7F3EC;
    --ink: #171615;
    --muted: #6E6A63;
    --line: #D7D0C4;
    --panel: #FFFCF5;
    --max-width: 1360px;
  }

  *, *::before, *::after {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  a {
    color: inherit;
  }

  .shell {
    min-height: 100vh;
  }

  .topbar {
    border-bottom: 2px solid var(--ink);
    background: var(--panel);
  }

  .topbar-inner {
    width: min(var(--max-width), calc(100% - 48px));
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 18px;
    padding: 18px 0;
  }

  .brand {
    font-size: 12px;
    font-weight: 900;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }

  .nav-link {
    min-height: 36px;
    border: 1px solid var(--ink);
    padding: 9px 14px;
    background: transparent;
    color: var(--ink);
    font-size: 12px;
    font-weight: 900;
    letter-spacing: 0.08em;
    text-decoration: none;
    text-transform: uppercase;
    transition: background 200ms ease, color 200ms ease;
  }

  .nav-link:hover {
    background: var(--ink);
    color: var(--paper);
  }

  .detail {
    width: min(var(--max-width), calc(100% - 48px));
    margin: 0 auto;
    padding: 46px 0 70px;
  }

  .hero {
    display: grid;
    grid-template-columns: minmax(0, 0.82fr) minmax(420px, 1fr);
    border: 2px solid var(--ink);
    background: var(--panel);
  }

  .summary {
    padding: clamp(28px, 5vw, 58px);
    border-right: 1px solid var(--line);
  }

  .kicker {
    margin-bottom: 18px;
    color: var(--muted);
    font-size: 12px;
    font-weight: 900;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }

  .title {
    margin: 0;
    font-family: "Playfair Display", "Noto Serif SC", serif;
    font-size: clamp(42px, 6vw, 76px);
    line-height: 0.98;
  }

  .subtitle {
    margin-top: 18px;
    color: var(--accent-color);
    font-size: 12px;
    font-weight: 900;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }

  .description {
    max-width: 620px;
    margin: 26px 0 0;
    color: #4F4B45;
    font-size: 16px;
    line-height: 1.8;
  }

  .actions {
    display: flex;
    flex-wrap: wrap;
    gap: 0;
    margin-top: 34px;
  }

  .action {
    min-height: 42px;
    padding: 12px 18px;
    border: 1px solid var(--ink);
    margin-right: -1px;
    color: var(--ink);
    font-size: 12px;
    font-weight: 900;
    letter-spacing: 0.08em;
    text-decoration: none;
    text-transform: uppercase;
    transition: background 200ms ease, color 200ms ease;
  }

  .action:hover {
    background: var(--ink);
    color: var(--paper);
  }

  .visual {
    position: relative;
    min-height: 520px;
    overflow: hidden;
    display: grid;
    place-items: center;
    background:
      radial-gradient(circle at 14% 18%, color-mix(in srgb, var(--accent-color), transparent 18%) 0 14%, transparent 34%),
      radial-gradient(circle at 86% 28%, color-mix(in srgb, var(--secondary), transparent 24%) 0 12%, transparent 34%),
      radial-gradient(circle at 50% 92%, color-mix(in srgb, var(--tertiary), transparent 20%) 0 16%, transparent 36%),
      var(--bg);
    color: var(--fg);
  }

  .visual::before {
    content: "";
    position: absolute;
    inset: 28px;
    border: 1px solid color-mix(in srgb, var(--accent-color), transparent 52%);
    pointer-events: none;
  }

  .visual::after {
    content: "";
    position: absolute;
    right: 34px;
    bottom: 34px;
    width: 118px;
    height: 118px;
    border-radius: 50%;
    background: color-mix(in srgb, var(--accent-color), transparent 8%);
    box-shadow:
      -74px -62px 0 color-mix(in srgb, var(--secondary), transparent 18%),
      -152px 28px 0 color-mix(in srgb, var(--tertiary), transparent 18%);
    opacity: 0.82;
  }

  .visual-card {
    position: relative;
    z-index: 2;
    width: min(72%, 520px);
    padding: clamp(28px, 5vw, 54px);
    border: 1px solid color-mix(in srgb, var(--fg), transparent 76%);
    background: color-mix(in srgb, var(--bg), transparent 12%);
    text-align: center;
  }

  .visual-title {
    color: var(--fg);
    font-family: var(--display-font);
    font-size: clamp(38px, 6vw, 70px);
    font-weight: var(--title-weight);
    line-height: 1;
    text-transform: var(--title-transform);
  }

  .visual-subtitle {
    margin-top: 18px;
    color: var(--accent-color);
    font-size: 11px;
    font-weight: 900;
    letter-spacing: 0.22em;
    text-transform: uppercase;
  }

  .meta-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    border: 2px solid var(--ink);
    border-top: 0;
    background: var(--line);
    gap: 1px;
  }

  .meta-card {
    min-height: 180px;
    padding: 24px;
    background: var(--panel);
  }

  .meta-label {
    color: #969086;
    font-size: 10px;
    font-weight: 900;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }

  .meta-value {
    margin-top: 12px;
    font-size: 20px;
    font-weight: 850;
    line-height: 1.35;
  }

  .palette {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    border: 2px solid var(--ink);
    border-top: 0;
  }

  .swatch {
    min-height: 132px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    border-right: 1px solid rgba(23, 22, 21, 0.18);
    background: var(--color);
    color: var(--label-color);
  }

  .swatch:last-child {
    border-right: 0;
  }

  .swatch-name {
    font-size: 11px;
    font-weight: 900;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .swatch-code {
    margin-top: 6px;
    font-size: 13px;
    font-weight: 800;
  }

  .tag-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 26px;
  }

  .tag {
    border: 1px solid var(--line);
    padding: 7px 10px;
    background: var(--panel);
    color: var(--muted);
    font-size: 11px;
    font-weight: 900;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .error {
    border: 2px solid var(--ink);
    padding: 40px;
    background: var(--panel);
  }

  /* ── Showcase Section ── */
  .showcase {
    margin-top: 46px;
  }

  .showcase-header {
    margin-bottom: 28px;
  }

  .showcase-title {
    margin: 0;
    font-family: "Playfair Display", "Noto Serif SC", serif;
    font-size: clamp(28px, 3vw, 42px);
    line-height: 1.1;
  }

  .showcase-desc {
    max-width: 680px;
    margin: 10px 0 0;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.7;
  }

  .showcase-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 24px;
  }

  .mockup-frame {
    border: 2px solid var(--ink);
    background: var(--panel);
    overflow: hidden;
  }

  .mockup-label {
    padding: 12px 16px;
    border-bottom: 1px solid var(--line);
    font-size: 10px;
    font-weight: 900;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .mockup-label-dot {
    display: flex;
    gap: 5px;
  }

  .mockup-label-dot span {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--line);
  }

  .mockup-viewport {
    position: relative;
    overflow: hidden;
  }

  /* ── Website Mockup ── */
  .web-mock {
    background: var(--bg);
    color: var(--fg);
    font-family: var(--display-font);
    padding: 0;
    min-height: 480px;
  }

  .web-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid color-mix(in srgb, var(--fg), transparent 88%);
  }

  .web-nav-logo {
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.06em;
  }

  .web-nav-links {
    display: flex;
    gap: 16px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: color-mix(in srgb, var(--fg), transparent 36%);
  }

  .web-hero {
    padding: 48px 20px 36px;
    text-align: center;
  }

  .web-hero-tag {
    display: inline-block;
    padding: 4px 10px;
    margin-bottom: 14px;
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--accent-color);
    border: 1px solid color-mix(in srgb, var(--accent-color), transparent 60%);
    background: color-mix(in srgb, var(--accent-color), transparent 92%);
  }

  .web-hero-title {
    font-size: clamp(22px, 3vw, 32px);
    font-weight: var(--title-weight);
    line-height: 1.1;
    text-transform: var(--title-transform);
    max-width: 320px;
    margin: 0 auto;
  }

  .web-hero-sub {
    margin-top: 10px;
    font-size: 11px;
    color: color-mix(in srgb, var(--fg), transparent 40%);
    font-weight: 400;
    font-family: "Inter", sans-serif;
    line-height: 1.6;
  }

  .web-hero-cta {
    display: inline-block;
    margin-top: 18px;
    padding: 10px 24px;
    background: var(--accent-color);
    color: var(--bg);
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.06em;
    border: none;
  }

  .web-cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    padding: 0 20px 24px;
  }

  .web-card {
    padding: 16px 14px;
    background: color-mix(in srgb, var(--secondary), transparent 40%);
    border: 1px solid color-mix(in srgb, var(--fg), transparent 90%);
  }

  .web-card-icon {
    width: 28px;
    height: 28px;
    margin-bottom: 10px;
    background: var(--accent-color);
    opacity: 0.8;
  }

  .web-card-icon.circle { border-radius: 50%; }
  .web-card-icon.diamond { transform: rotate(45deg); width: 22px; height: 22px; margin: 3px 0 13px 3px; }
  .web-card-icon.triangle { background: transparent; width: 0; height: 0; border-left: 14px solid transparent; border-right: 14px solid transparent; border-bottom: 24px solid var(--accent-color); opacity: 0.8; }

  .web-card-title {
    font-size: 11px;
    font-weight: 800;
    margin-bottom: 5px;
  }

  .web-card-text {
    font-size: 9px;
    line-height: 1.5;
    color: color-mix(in srgb, var(--fg), transparent 40%);
    font-family: "Inter", sans-serif;
    font-weight: 400;
  }

  .web-footer {
    padding: 14px 20px;
    border-top: 1px solid color-mix(in srgb, var(--fg), transparent 88%);
    font-size: 9px;
    color: color-mix(in srgb, var(--fg), transparent 50%);
    font-family: "Inter", sans-serif;
    display: flex;
    justify-content: space-between;
  }

  /* ── Mobile App Mockup ── */
  .app-mock-wrap {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 28px 20px;
    min-height: 480px;
    background:
      linear-gradient(135deg, color-mix(in srgb, var(--bg), var(--panel) 70%) 0%, var(--panel) 100%);
  }

  .app-phone {
    width: 220px;
    background: var(--bg);
    color: var(--fg);
    border-radius: 24px;
    border: 2px solid color-mix(in srgb, var(--fg), transparent 70%);
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.18);
    font-family: var(--display-font);
  }

  .app-status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 18px 4px;
    font-size: 9px;
    font-weight: 700;
    font-family: "Inter", sans-serif;
  }

  .app-notch {
    width: 80px;
    height: 20px;
    background: color-mix(in srgb, var(--fg), transparent 90%);
    border-radius: 0 0 12px 12px;
    margin: 0 auto 4px;
  }

  .app-header {
    padding: 12px 18px 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .app-header-title {
    font-size: 16px;
    font-weight: 800;
  }

  .app-header-avatar {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: var(--accent-color);
  }

  .app-search {
    margin: 6px 18px 12px;
    padding: 8px 12px;
    background: color-mix(in srgb, var(--fg), transparent 92%);
    border-radius: 8px;
    font-size: 9px;
    color: color-mix(in srgb, var(--fg), transparent 50%);
    font-family: "Inter", sans-serif;
  }

  .app-card {
    margin: 0 18px 10px;
    padding: 14px;
    background: color-mix(in srgb, var(--secondary), transparent 50%);
    border: 1px solid color-mix(in srgb, var(--fg), transparent 90%);
    border-radius: 10px;
  }

  .app-card-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .app-card-thumb {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    flex-shrink: 0;
  }

  .app-card-info {
    flex: 1;
    min-width: 0;
  }

  .app-card-name {
    font-size: 11px;
    font-weight: 800;
  }

  .app-card-sub {
    font-size: 8px;
    color: color-mix(in srgb, var(--fg), transparent 40%);
    margin-top: 2px;
    font-family: "Inter", sans-serif;
    font-weight: 400;
  }

  .app-card-badge {
    padding: 3px 8px;
    background: var(--accent-color);
    color: var(--bg);
    font-size: 8px;
    font-weight: 800;
    border-radius: 6px;
    flex-shrink: 0;
  }

  .app-card-bar {
    margin-top: 10px;
    height: 4px;
    background: color-mix(in srgb, var(--fg), transparent 88%);
    border-radius: 2px;
    overflow: hidden;
  }

  .app-card-bar-fill {
    height: 100%;
    border-radius: 2px;
  }

  .app-tab-bar {
    display: flex;
    justify-content: space-around;
    padding: 10px 0 14px;
    border-top: 1px solid color-mix(in srgb, var(--fg), transparent 88%);
    margin-top: 8px;
  }

  .app-tab {
    text-align: center;
    font-size: 7px;
    font-weight: 700;
    font-family: "Inter", sans-serif;
    color: color-mix(in srgb, var(--fg), transparent 50%);
  }

  .app-tab.active {
    color: var(--accent-color);
  }

  .app-tab-icon {
    width: 18px;
    height: 18px;
    margin: 0 auto 3px;
    border-radius: 4px;
    background: color-mix(in srgb, var(--fg), transparent 82%);
  }

  .app-tab.active .app-tab-icon {
    background: var(--accent-color);
  }

  /* ── Dashboard Mockup ── */
  .dash-mock {
    background: var(--bg);
    color: var(--fg);
    font-family: "Inter", sans-serif;
    min-height: 480px;
    display: grid;
    grid-template-columns: 48px 1fr;
  }

  .dash-sidebar {
    background: color-mix(in srgb, var(--fg), transparent 92%);
    border-right: 1px solid color-mix(in srgb, var(--fg), transparent 85%);
    padding: 14px 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .dash-sidebar-logo {
    width: 24px;
    height: 24px;
    border-radius: 6px;
    background: var(--accent-color);
    margin-bottom: 8px;
  }

  .dash-sidebar-item {
    width: 24px;
    height: 24px;
    border-radius: 6px;
    background: color-mix(in srgb, var(--fg), transparent 82%);
  }

  .dash-sidebar-item.active {
    background: var(--accent-color);
  }

  .dash-main {
    padding: 18px;
  }

  .dash-topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .dash-topbar-title {
    font-size: 14px;
    font-weight: 800;
    font-family: var(--display-font);
  }

  .dash-topbar-btn {
    padding: 5px 12px;
    background: var(--accent-color);
    color: var(--bg);
    font-size: 9px;
    font-weight: 700;
    border-radius: 4px;
  }

  .dash-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }

  .dash-stat {
    padding: 12px;
    background: color-mix(in srgb, var(--secondary), transparent 50%);
    border: 1px solid color-mix(in srgb, var(--fg), transparent 90%);
    border-radius: 8px;
  }

  .dash-stat-value {
    font-size: 18px;
    font-weight: 900;
    line-height: 1;
  }

  .dash-stat-label {
    font-size: 8px;
    color: color-mix(in srgb, var(--fg), transparent 40%);
    margin-top: 4px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .dash-chart {
    padding: 14px;
    background: color-mix(in srgb, var(--secondary), transparent 60%);
    border: 1px solid color-mix(in srgb, var(--fg), transparent 90%);
    border-radius: 8px;
    margin-bottom: 14px;
  }

  .dash-chart-title {
    font-size: 10px;
    font-weight: 800;
    margin-bottom: 12px;
  }

  .dash-bars {
    display: flex;
    align-items: flex-end;
    gap: 6px;
    height: 80px;
  }

  .dash-bar {
    flex: 1;
    border-radius: 3px 3px 0 0;
    min-width: 0;
  }

  .dash-table {
    width: 100%;
    border-collapse: collapse;
  }

  .dash-table-header {
    display: grid;
    grid-template-columns: 1.2fr 0.8fr 0.8fr 0.6fr;
    padding: 6px 10px;
    background: color-mix(in srgb, var(--fg), transparent 92%);
    border-radius: 4px;
    font-size: 8px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: color-mix(in srgb, var(--fg), transparent 30%);
    margin-bottom: 4px;
  }

  .dash-table-row {
    display: grid;
    grid-template-columns: 1.2fr 0.8fr 0.8fr 0.6fr;
    padding: 7px 10px;
    border-bottom: 1px solid color-mix(in srgb, var(--fg), transparent 92%);
    font-size: 9px;
    align-items: center;
  }

  .dash-table-status {
    display: inline-block;
    padding: 2px 6px;
    border-radius: 3px;
    font-size: 7px;
    font-weight: 700;
  }

  @media (max-width: 900px) {
    .topbar-inner,
    .detail {
      width: min(100% - 32px, var(--max-width));
    }

    .hero,
    .meta-grid,
    .palette {
      grid-template-columns: 1fr;
    }

    .summary {
      border-right: 0;
      border-bottom: 1px solid var(--line);
    }

    .visual {
      min-height: 420px;
    }

    .swatch {
      min-height: 96px;
      border-right: 0;
      border-bottom: 1px solid rgba(23, 22, 21, 0.18);
    }

    .swatch:last-child {
      border-bottom: 0;
    }

    .showcase-grid {
      grid-template-columns: 1fr;
    }

    .app-mock-wrap {
      min-height: 520px;
    }
  }
</style>
</head>
<body>
<div class="shell">
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">xdx-lab-design-skill</div>
      <a class="nav-link" href="index.html">返回画廊</a>
    </div>
  </header>

  <main class="detail" id="detail"></main>
</div>

<script src="style-data.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const styleId = (params.get("id") || "01").padStart(2, "0");
  const style = window.designStyleData.styles.find((item) => item.id === styleId);
  const detail = document.getElementById("detail");

  function getLabelColor(color) {
    const hex = color.replace("#", "");
    if (hex.length !== 6) {
      return "#171615";
    }

    const red = parseInt(hex.slice(0, 2), 16);
    const green = parseInt(hex.slice(2, 4), 16);
    const blue = parseInt(hex.slice(4, 6), 16);
    const luminance = (0.2126 * red + 0.7152 * green + 0.0722 * blue) / 255;
    return luminance > 0.58 ? "#171615" : "#FFFCF5";
  }

  function createTag(tag) {
    const element = document.createElement("span");
    element.className = "tag";
    element.textContent = tag;
    return element;
  }

  function createSwatch(name, color) {
    const swatch = document.createElement("div");
    swatch.className = "swatch";
    swatch.style.setProperty("--color", color);
    swatch.style.setProperty("--label-color", getLabelColor(color));

    const swatchName = document.createElement("div");
    swatchName.className = "swatch-name";
    swatchName.textContent = name;

    const swatchCode = document.createElement("div");
    swatchCode.className = "swatch-code";
    swatchCode.textContent = color;

    swatch.append(swatchName, swatchCode);
    return swatch;
  }
