<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>设计大师方法论详情 — xdx-lab-design-skill</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Narrow:wght@600;700&family=Fraunces:wght@600;800&family=Inter:wght@400;500;600;700;800;900&family=Noto+Serif+SC:wght@500;700&family=Oswald:wght@600;700&family=Space+Grotesk:wght@500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { margin: 0; overflow-x: hidden; }
  a { color: inherit; text-decoration: none; }

  /* ═══ Floating Controls ═══ */
  .fab-bar {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 1000;
    display: flex; gap: 6px; padding: 5px;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(14px);
    border-radius: 40px; border: 1px solid rgba(255,255,255,0.1);
  }
  .fab-bar a, .fab-bar button {
    padding: 8px 18px; font-size: 12px; font-weight: 700;
    font-family: "Inter", sans-serif; color: #fff; background: 0; border: 0;
    border-radius: 30px; cursor: pointer; letter-spacing: 0.03em; transition: background 0.2s;
  }
  .fab-bar a:hover, .fab-bar button:hover { background: rgba(255,255,255,0.15); }

  /* ═══ Info Panel ═══ */
  .info-overlay {
    position: fixed; inset: 0; z-index: 2000;
    background: rgba(0,0,0,0.45); backdrop-filter: blur(4px);
    opacity: 0; pointer-events: none; transition: opacity 0.3s;
  }
  .info-overlay.open { opacity: 1; pointer-events: auto; }
  .info-panel {
    position: fixed; top: 0; right: 0; bottom: 0; width: min(440px, 90vw); z-index: 2001;
    background: #fff; color: #111; padding: 40px 28px; overflow-y: auto;
    transform: translateX(100%); transition: transform 0.3s ease;
    font-family: "Inter", sans-serif;
  }
  .info-panel.open { transform: translateX(0); }
  .info-close { position: absolute; top: 14px; right: 14px; background: 0; border: 0; font-size: 26px; cursor: pointer; color: #999; }
  .info-panel h2 { font-size: 22px; font-weight: 800; margin-bottom: 2px; }
  .info-zh { font-size: 16px; color: #666; margin-bottom: 4px; font-family: "Noto Serif SC", serif; }
  .info-cat { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #999; margin-bottom: 14px; }
  .info-method { font-size: 13px; font-weight: 800; color: #333; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 16px; padding: 6px 12px; border-left: 3px solid #333; background: #f7f7f7; }
  .info-desc { font-size: 14px; line-height: 1.7; color: #555; margin-bottom: 16px; }
  .info-work { font-size: 13px; line-height: 1.7; color: #444; margin-bottom: 20px; padding: 12px; background: #f9f9f9; border-radius: 6px; }
  .info-work strong { display: block; font-size: 14px; font-weight: 800; color: #222; margin-bottom: 4px; }
  .info-principles { margin-bottom: 20px; }
  .info-principles h4 { font-size: 11px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; color: #999; margin-bottom: 8px; }
  .info-principle { padding: 8px 0; border-bottom: 1px solid #eee; font-size: 13px; font-weight: 600; color: #333; line-height: 1.5; }
  .info-principle:last-child { border-bottom: none; }
  .info-swatches { display: flex; gap: 6px; margin-bottom: 20px; }
  .info-sw { flex: 1; aspect-ratio: 1; border-radius: 8px; border: 1px solid rgba(0,0,0,0.06); display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding: 5px; }
  .info-sw span { font-size: 8px; font-weight: 700; font-family: "Inter", sans-serif; }
  .info-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; }
  .info-tag { padding: 4px 10px; font-size: 10px; font-weight: 700; border: 1px solid #ddd; border-radius: 20px; letter-spacing: 0.06em; text-transform: uppercase; }
  .info-link { display: block; padding: 12px; background: #111; color: #fff; text-align: center; font-size: 13px; font-weight: 700; border-radius: 8px; margin-top: 10px; }

  /* ═══ Demo Page Base ═══ */
  .demo { min-height: 100vh; background: var(--bg); color: var(--fg); font-family: var(--display-font); }

  /* ═══ Nav ═══ */
  .d-nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px clamp(24px, 5vw, 80px);
    border-bottom: 1px solid color-mix(in srgb, var(--fg), transparent 88%);
  }
  .d-logo { font-size: 18px; font-weight: 800; letter-spacing: 0.04em; }
  .d-links { display: flex; gap: 28px; font-size: 13px; font-weight: 600; color: color-mix(in srgb, var(--fg), transparent 30%); }
  .d-nav-btn { padding: 8px 20px; font-size: 12px; font-weight: 700; background: var(--accent-color); color: var(--bg); border-radius: 6px; }

  /* ═══ Hero ═══ */
  .d-hero {
    position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; min-height: 80vh; padding: 120px clamp(24px, 5vw, 80px) 80px; overflow: hidden;
  }
  .d-hero::before, .d-hero::after { content: ""; position: absolute; pointer-events: none; border-radius: 50%; }
  .d-hero::before { width: 320px; height: 320px; right: 8%; top: 12%; background: color-mix(in srgb, var(--accent-color), transparent 88%); filter: blur(60px); }
  .d-hero::after { width: 220px; height: 220px; left: 10%; bottom: 12%; background: color-mix(in srgb, var(--secondary), transparent 88%); filter: blur(50px); }
  .d-badge {
    display: inline-block; padding: 6px 16px; margin-bottom: 24px;
    font-size: 11px; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--accent-color); border: 1px solid color-mix(in srgb, var(--accent-color), transparent 60%); border-radius: 30px;
  }
  .d-title {
    font-size: clamp(44px, 8vw, 100px); font-weight: var(--title-weight); line-height: 1.02;
    text-transform: var(--title-transform); letter-spacing: -0.02em; max-width: 900px; position: relative; z-index: 1;
  }
  .d-subtitle {
    max-width: 540px; margin-top: 20px; font-size: 16px; line-height: 1.7;
    color: color-mix(in srgb, var(--fg), transparent 30%); font-family: "Inter", sans-serif; font-weight: 400; position: relative; z-index: 1;
  }
  .d-btn {
    display: inline-block; margin-top: 36px; padding: 14px 36px;
    font-size: 14px; font-weight: 800; letter-spacing: 0.04em;
    background: var(--accent-color); color: var(--bg); border-radius: 8px; position: relative; z-index: 1;
  }

  /* ═══ Features ═══ */
  .d-features { padding: 80px clamp(24px, 5vw, 80px); }
  .d-section-title { text-align: center; margin-bottom: 48px; font-size: clamp(24px, 3vw, 36px); font-weight: var(--title-weight); text-transform: var(--title-transform); }
  .d-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; max-width: 1100px; margin: 0 auto; }
  .d-card {
    padding: 36px 28px; background: color-mix(in srgb, var(--fg), transparent 96%);
    border: 1px solid color-mix(in srgb, var(--fg), transparent 90%); border-radius: 12px;
  }
  .d-card-icon { width: 48px; height: 48px; margin-bottom: 20px; background: color-mix(in srgb, var(--accent-color), transparent 20%); border-radius: 12px; }
  .d-card h3 { font-size: 18px; font-weight: 800; margin-bottom: 10px; }
  .d-card p { font-size: 14px; line-height: 1.6; color: color-mix(in srgb, var(--fg), transparent 35%); font-family: "Inter", sans-serif; font-weight: 400; }

  /* ═══ Gallery ═══ */
  .d-gallery { padding: 20px clamp(24px, 5vw, 80px) 80px; max-width: 1200px; margin: 0 auto; }
  .d-gallery-grid { display: grid; grid-template-columns: 1.4fr 1fr; grid-template-rows: 260px 260px; gap: 20px; }
  .d-gal-item { border-radius: 12px; overflow: hidden; position: relative; }
  .d-gal-item:first-child { grid-row: 1 / 3; }
  .d-gal-label { position: absolute; bottom: 16px; left: 16px; font-size: 13px; font-weight: 700; color: #fff; background: rgba(0,0,0,0.5); padding: 6px 14px; border-radius: 6px; backdrop-filter: blur(4px); }

  /* ═══ Stats ═══ */
  .d-stats {
    padding: 60px clamp(24px, 5vw, 80px);
    border-top: 1px solid color-mix(in srgb, var(--fg), transparent 88%);
    border-bottom: 1px solid color-mix(in srgb, var(--fg), transparent 88%);
  }
  .d-stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; max-width: 1000px; margin: 0 auto; text-align: center; }
  .d-stat-val { font-size: clamp(32px, 4vw, 48px); font-weight: 900; line-height: 1; color: var(--accent-color); }
  .d-stat-lbl { margin-top: 8px; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: color-mix(in srgb, var(--fg), transparent 40%); font-family: "Inter", sans-serif; }

  /* ═══ CTA ═══ */
  .d-cta { padding: 100px clamp(24px, 5vw, 80px); text-align: center; }
  .d-cta h2 { font-size: clamp(28px, 4vw, 48px); font-weight: var(--title-weight); text-transform: var(--title-transform); max-width: 700px; margin: 0 auto; }
  .d-cta-btn {
    display: inline-block; margin-top: 32px; padding: 16px 40px;
    font-size: 15px; font-weight: 800; letter-spacing: 0.04em;
    background: var(--accent-color); color: var(--bg); border-radius: 8px;
  }

  /* ═══ Footer ═══ */
  .d-footer {
    padding: 36px clamp(24px, 5vw, 80px);
    border-top: 1px solid color-mix(in srgb, var(--fg), transparent 88%);
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12px; color: color-mix(in srgb, var(--fg), transparent 50%); font-family: "Inter", sans-serif;
  }
  .d-footer-links { display: flex; gap: 24px; }

  /* ═══════════════════════════════════════════════
     MASTER-SPECIFIC VISUAL LANGUAGE
     ═══════════════════════════════════════════════ */

  /* ── Dieter Rams: functional minimal, red focus only ── */
  .master-rams .d-hero::before, .master-rams .d-hero::after { opacity: 0.3; filter: blur(80px); }
  .master-rams .d-nav { border-bottom: 2px solid var(--fg); }
  .master-rams .d-card { background: #fff; border: 1px solid var(--secondary); border-radius: 4px; }
  .master-rams .d-card-icon { border-radius: 50%; border: 2px solid var(--fg); background: transparent; }
  .master-rams .d-card:first-child .d-card-icon { background: var(--accent-color); border-color: var(--accent-color); }
  .master-rams .d-badge { border-radius: 0; border-color: var(--fg); color: var(--fg); }
  .master-rams .d-btn, .master-rams .d-cta-btn { border-radius: 2px; }
  .master-rams .d-nav-btn { border-radius: 2px; }
  .master-rams .d-gal-item { border-radius: 2px; }
  .master-rams .d-stats, .master-rams .d-footer { border-color: var(--secondary); }

  /* ── Vignelli: grid discipline, system colors ── */
  .master-vignelli .d-hero::before, .master-vignelli .d-hero::after { display: none; }
  .master-vignelli .d-hero { background: linear-gradient(90deg, color-mix(in srgb, var(--fg), transparent 95%) 1px, transparent 1px), linear-gradient(180deg, color-mix(in srgb, var(--fg), transparent 95%) 1px, transparent 1px); background-size: 48px 48px; }
  .master-vignelli .d-nav { border-bottom: 3px solid var(--fg); }
  .master-vignelli .d-card { border: 1px solid var(--fg); border-radius: 0; background: transparent; }
  .master-vignelli .d-badge { border-radius: 0; border: 2px solid var(--accent-color); color: var(--accent-color); }
  .master-vignelli .d-btn, .master-vignelli .d-cta-btn, .master-vignelli .d-nav-btn { border-radius: 0; }
  .master-vignelli .d-card-icon { border-radius: 0; }
  .master-vignelli .d-gal-item { border-radius: 0; }
  .master-vignelli .d-stats, .master-vignelli .d-footer { border-color: var(--fg); }

  /* ── Paul Rand: playful geometry, primary wit ── */
  .master-rand .d-hero::before { width: 240px; height: 240px; border-radius: 50%; background: color-mix(in srgb, var(--accent-color), transparent 75%); filter: blur(40px); }
  .master-rand .d-hero::after { width: 180px; height: 180px; border-radius: 0; background: color-mix(in srgb, var(--secondary), transparent 80%); filter: blur(35px); transform: rotate(12deg); }
  .master-rand .d-card { border-radius: 8px; border: 2px solid var(--fg); background: transparent; }
  .master-rand .d-card:nth-child(1) .d-card-icon { border-radius: 50%; background: var(--accent-color); }
  .master-rand .d-card:nth-child(2) .d-card-icon { border-radius: 0; background: var(--secondary); }
  .master-rand .d-card:nth-child(3) .d-card-icon { border-radius: 0; background: var(--tertiary); clip-path: polygon(50% 0%, 0% 100%, 100% 100%); }
  .master-rand .d-badge { border-radius: 30px; background: var(--tertiary); border-color: var(--tertiary); color: var(--fg); }
  .master-rand .d-btn, .master-rand .d-cta-btn { border-radius: 30px; }
  .master-rand .d-gal-item { border-radius: 8px; border: 2px solid var(--fg); }

  /* ── Saul Bass: cinematic reduction, diagonal energy ── */
  .master-bass .d-hero::before { inset: 0; width: auto; height: auto; right: auto; top: auto; border-radius: 0; background: linear-gradient(128deg, transparent 0 38%, color-mix(in srgb, var(--accent-color), transparent 85%) 39% 52%, transparent 53%); filter: none; }
  .master-bass .d-hero::after { display: none; }
  .master-bass .d-title { letter-spacing: -0.04em; }
  .master-bass .d-nav { border-bottom: 4px solid var(--accent-color); }
  .master-bass .d-card { border: none; border-radius: 0; background: color-mix(in srgb, var(--accent-color), transparent 90%); border-left: 4px solid var(--accent-color); }
  .master-bass .d-card-icon { border-radius: 0; clip-path: polygon(50% 0%, 0% 100%, 100% 100%); }
  .master-bass .d-badge { border-radius: 0; background: var(--accent-color); color: var(--bg); border-color: var(--accent-color); }
  .master-bass .d-btn, .master-bass .d-cta-btn { border-radius: 0; background: var(--fg); color: var(--bg); }
  .master-bass .d-nav-btn { border-radius: 0; background: var(--fg); color: var(--bg); }
  .master-bass .d-gal-item { border-radius: 0; }

  /* ── Brockmann: Swiss grid, geometric rhythm ── */
  .master-brockmann .d-hero::before { left: 50%; top: 50%; right: auto; transform: translate(-50%, -50%); width: 300px; height: 300px; border: 30px solid color-mix(in srgb, var(--accent-color), transparent 60%); background: none; filter: none; }
  .master-brockmann .d-hero::after { left: 50%; top: 50%; right: auto; bottom: auto; transform: translate(-30%, -60%); width: 4px; height: 320px; border-radius: 0; background: color-mix(in srgb, var(--secondary), transparent 50%); filter: none; }
  .master-brockmann .d-nav { border-bottom: 2px solid var(--fg); }
  .master-brockmann .d-card { border: 1px solid var(--fg); border-radius: 0; background: transparent; }
  .master-brockmann .d-card-icon { border-radius: 50%; }
  .master-brockmann .d-badge { border-radius: 0; border-color: var(--accent-color); color: var(--accent-color); }
  .master-brockmann .d-btn, .master-brockmann .d-cta-btn, .master-brockmann .d-nav-btn { border-radius: 0; }
  .master-brockmann .d-gal-item { border-radius: 0; }
  .master-brockmann .d-stats, .master-brockmann .d-footer { border-color: var(--fg); }

  /* ── Hofmann: high contrast, bold form ── */
  .master-hofmann .d-hero::before { right: -8%; bottom: -10%; top: auto; width: 400px; height: 400px; background: var(--fg); filter: none; opacity: 0.85; }
  .master-hofmann .d-hero::after { left: 12%; bottom: 20%; width: 180px; height: 6px; border-radius: 0; background: var(--accent-color); filter: none; }
  .master-hofmann .d-nav { border-bottom: 3px solid var(--fg); }
  .master-hofmann .d-card { border: none; border-radius: 0; background: transparent; border-bottom: 3px solid var(--fg); }
  .master-hofmann .d-card-icon { border-radius: 50%; background: var(--fg); }
  .master-hofmann .d-badge { border-radius: 0; border: 2px solid var(--fg); color: var(--fg); }
  .master-hofmann .d-btn, .master-hofmann .d-cta-btn { border-radius: 0; background: var(--fg); color: var(--bg); }
  .master-hofmann .d-nav-btn { border-radius: 0; background: var(--fg); color: var(--bg); }
  .master-hofmann .d-gal-item { border-radius: 0; }
  .master-hofmann .d-stat-val { color: var(--fg); }

  /* ── Aicher: systematic pictogram, categorical color ── */
  .master-aicher .d-hero::before, .master-aicher .d-hero::after { display: none; }
  .master-aicher .d-card { border: 2px solid var(--fg); border-radius: 0; background: transparent; }
  .master-aicher .d-card:nth-child(1) .d-card-icon { border-radius: 50%; background: var(--accent-color); }
  .master-aicher .d-card:nth-child(2) .d-card-icon { border-radius: 4px; background: var(--secondary); }
  .master-aicher .d-card:nth-child(3) .d-card-icon { border-radius: 0; background: var(--tertiary); clip-path: polygon(50% 0, 100% 100%, 0 100%); }
  .master-aicher .d-badge { border-radius: 0; border: 2px solid var(--accent-color); color: var(--accent-color); }
  .master-aicher .d-btn, .master-aicher .d-cta-btn, .master-aicher .d-nav-btn { border-radius: 0; }
  .master-aicher .d-gal-item { border-radius: 0; }
  .master-aicher .d-nav { border-bottom: 2px solid var(--fg); }

  /* ── Moholy-Nagy: Bauhaus experimental, layers ── */
  .master-moholy .d-hero::before { inset: 0; width: auto; height: auto; right: auto; top: auto; border-radius: 0; background: linear-gradient(-18deg, transparent 0 60%, color-mix(in srgb, var(--tertiary), transparent 70%) 61% 80%, transparent 81%); filter: none; }
  .master-moholy .d-hero::after { left: 20%; top: 18%; width: 200px; height: 200px; border: 3px solid color-mix(in srgb, var(--secondary), transparent 40%); background: none; filter: none; }
  .master-moholy .d-card { border: 1px solid color-mix(in srgb, var(--fg), transparent 70%); border-radius: 0; background: color-mix(in srgb, var(--bg), var(--fg) 3%); }
  .master-moholy .d-card-icon { border-radius: 50%; border: 2px solid var(--secondary); background: transparent; }
  .master-moholy .d-badge { border-radius: 0; }
  .master-moholy .d-btn, .master-moholy .d-cta-btn, .master-moholy .d-nav-btn { border-radius: 0; }
  .master-moholy .d-gal-item { border-radius: 0; }

  /* ── Eames: warm playful, material modular ── */
  .master-eames .d-hero::before { width: 180px; height: 180px; background: color-mix(in srgb, var(--tertiary), transparent 50%); filter: blur(40px); border-radius: 30%; }
  .master-eames .d-hero::after { width: 140px; height: 140px; background: color-mix(in srgb, var(--secondary), transparent 60%); filter: blur(30px); }
  .master-eames .d-card { border: 2px solid var(--fg); border-radius: 8px; background: color-mix(in srgb, var(--tertiary), transparent 70%); }
  .master-eames .d-card:nth-child(2) .d-card-icon { border-radius: 50%; background: var(--accent-color); }
  .master-eames .d-card:nth-child(3) .d-card-icon { background: var(--secondary); transform: rotate(8deg); }
  .master-eames .d-badge { border-radius: 20px; background: color-mix(in srgb, var(--tertiary), transparent 50%); border-color: var(--fg); color: var(--fg); }
  .master-eames .d-btn, .master-eames .d-cta-btn { border-radius: 8px; }
  .master-eames .d-nav-btn { border-radius: 8px; }
  .master-eames .d-gal-item { border-radius: 8px; border: 2px solid var(--fg); }

  /* ── Loewy: streamline curves, industrial elegance ── */
  .master-loewy .d-hero::before { width: 500px; height: 100px; right: 5%; top: 50%; border-radius: 100px 30px 100px 30px; background: linear-gradient(90deg, color-mix(in srgb, var(--secondary), transparent 50%), color-mix(in srgb, var(--accent-color), transparent 70%)); filter: none; }
  .master-loewy .d-hero::after { width: 300px; height: 3px; left: 15%; bottom: 28%; border-radius: 0; background: var(--accent-color); filter: none; box-shadow: 0 14px 0 color-mix(in srgb, var(--tertiary), transparent 40%), 0 28px 0 color-mix(in srgb, var(--secondary), transparent 50%); }
  .master-loewy .d-card { border: 1px solid color-mix(in srgb, var(--fg), transparent 80%); border-radius: 16px; background: color-mix(in srgb, var(--fg), transparent 96%); }
  .master-loewy .d-card-icon { border-radius: 50%; }
  .master-loewy .d-badge { border-radius: 30px; }
  .master-loewy .d-btn, .master-loewy .d-cta-btn, .master-loewy .d-nav-btn { border-radius: 30px; }
  .master-loewy .d-gal-item { border-radius: 16px; }

  /* ── Sottsass: Memphis postmodern, bold anti-neutral ── */
  .master-sottsass .d-hero::before { inset: 0; width: auto; height: auto; right: auto; top: auto; border-radius: 0; background: radial-gradient(circle at 20% 20%, var(--tertiary) 0 10px, transparent 11px), linear-gradient(45deg, transparent 0 44%, color-mix(in srgb, var(--fg), transparent 92%) 45% 48%, transparent 49%); filter: none; }
  .master-sottsass .d-hero::after { display: none; }
  .master-sottsass .d-nav { border-bottom: 4px solid var(--fg); }
  .master-sottsass .d-card { border: 3px solid var(--fg); border-radius: 0; background: color-mix(in srgb, var(--secondary), transparent 70%); }
  .master-sottsass .d-card:nth-child(2) { background: color-mix(in srgb, var(--accent-color), transparent 75%); }
  .master-sottsass .d-card:nth-child(3) { background: color-mix(in srgb, var(--tertiary), transparent 60%); }
  .master-sottsass .d-card-icon { border-radius: 0; border: 3px solid var(--fg); }
  .master-sottsass .d-badge { border-radius: 0; border: 3px solid var(--fg); background: var(--tertiary); color: var(--fg); }
  .master-sottsass .d-btn, .master-sottsass .d-cta-btn { border: 3px solid var(--fg); border-radius: 0; box-shadow: 5px 5px 0 var(--fg); }
  .master-sottsass .d-nav-btn { border: 2px solid var(--fg); border-radius: 0; }
  .master-sottsass .d-gal-item { border-radius: 0; border: 3px solid var(--fg); }
  .master-sottsass .d-stats, .master-sottsass .d-footer { border-width: 3px; border-color: var(--fg); }

  /* ── Glaser: humanist warmth, organic ── */
  .master-glaser .d-hero::before { width: 200px; height: 200px; border-radius: 60% 40% 62% 38%; background: color-mix(in srgb, var(--accent-color), transparent 70%); filter: blur(30px); }
  .master-glaser .d-hero::after { width: 160px; height: 160px; background: color-mix(in srgb, var(--tertiary), transparent 65%); filter: blur(25px); }
  .master-glaser .d-card { border: none; border-radius: 16px; background: color-mix(in srgb, var(--secondary), transparent 80%); }
  .master-glaser .d-card-icon { border-radius: 50%; }
  .master-glaser .d-badge { border-radius: 30px; background: color-mix(in srgb, var(--accent-color), transparent 85%); border-color: transparent; }
  .master-glaser .d-btn, .master-glaser .d-cta-btn { border-radius: 30px; }
  .master-glaser .d-nav-btn { border-radius: 30px; }
  .master-glaser .d-nav { border-bottom: none; }
  .master-glaser .d-gal-item { border-radius: 16px; }

  /* ── Tanaka: tradition as geometry, sharp color fields ── */
  .master-tanaka .d-hero::before { left: 50%; top: 48%; right: auto; transform: translate(-50%, -50%); width: 260px; height: 260px; border-radius: 0; background: linear-gradient(90deg, color-mix(in srgb, var(--accent-color), transparent 80%) 0 50%, color-mix(in srgb, var(--secondary), transparent 80%) 50%); clip-path: polygon(50% 0, 100% 34%, 82% 100%, 18% 100%, 0 34%); filter: none; }
  .master-tanaka .d-hero::after { display: none; }
  .master-tanaka .d-nav { border-bottom: 2px solid var(--fg); }
  .master-tanaka .d-card { border: 1px solid color-mix(in srgb, var(--fg), transparent 70%); border-radius: 0; background: transparent; }
  .master-tanaka .d-card-icon { border-radius: 0; }
  .master-tanaka .d-badge { border-radius: 0; border-color: var(--accent-color); color: var(--accent-color); letter-spacing: 0.2em; }
  .master-tanaka .d-btn, .master-tanaka .d-cta-btn, .master-tanaka .d-nav-btn { border-radius: 0; }
  .master-tanaka .d-gal-item { border-radius: 0; }

  /* ── Fukuda: visual wit, positive/negative ── */
  .master-fukuda .d-hero::before { left: 50%; top: 45%; right: auto; transform: translate(-50%, -50%); width: 250px; height: 250px; background: radial-gradient(circle at 64% 36%, var(--bg) 0 44px, var(--fg) 45px); filter: none; }
  .master-fukuda .d-hero::after { left: 50%; top: 45%; right: auto; bottom: auto; transform: translate(-50%, -50%); width: 100px; height: 100px; background: color-mix(in srgb, var(--accent-color), transparent 60%); filter: none; mix-blend-mode: screen; }
  .master-fukuda .d-card { border: 2px solid var(--fg); border-radius: 0; background: transparent; }
  .master-fukuda .d-card-icon { border-radius: 50%; background: var(--fg); }
  .master-fukuda .d-badge { border-radius: 0; border: 2px solid var(--fg); color: var(--fg); }
  .master-fukuda .d-btn, .master-fukuda .d-cta-btn { border-radius: 0; background: var(--fg); color: var(--bg); }
  .master-fukuda .d-nav-btn { border-radius: 0; background: var(--fg); color: var(--bg); }
  .master-fukuda .d-gal-item { border-radius: 0; }
  .master-fukuda .d-stat-val { color: var(--fg); }

  /* ── Hara: emptiness, extreme minimalism ── */
  .master-hara .d-hero::before, .master-hara .d-hero::after { display: none; }
  .master-hara .d-hero { min-height: 85vh; }
  .master-hara .d-nav { border-color: color-mix(in srgb, var(--fg), transparent 94%); }
  .master-hara .d-card { background: transparent; border: none; border-bottom: 1px solid color-mix(in srgb, var(--fg), transparent 88%); border-radius: 0; padding: 36px 0; }
  .master-hara .d-card-icon { display: none; }
  .master-hara .d-badge { border-color: color-mix(in srgb, var(--fg), transparent 80%); color: color-mix(in srgb, var(--fg), transparent 40%); border-radius: 0; }
  .master-hara .d-btn, .master-hara .d-cta-btn { background: transparent; color: var(--fg); border: 1px solid color-mix(in srgb, var(--fg), transparent 70%); border-radius: 0; }
  .master-hara .d-nav-btn { background: transparent; color: var(--fg); border: 1px solid color-mix(in srgb, var(--fg), transparent 70%); border-radius: 0; }
  .master-hara .d-stats, .master-hara .d-footer { border-color: color-mix(in srgb, var(--fg), transparent 92%); }
  .master-hara .d-stat-val { color: var(--fg); font-weight: 400; }
  .master-hara .d-gal-item { border-radius: 0; }

  /* ── Scher: type as image, giant letters ── */
  .master-scher .d-hero::before { inset: 0; width: auto; height: auto; right: auto; top: auto; border-radius: 0; background: linear-gradient(90deg, var(--accent-color) 0 16%, transparent 16%), linear-gradient(180deg, transparent 0 54%, color-mix(in srgb, var(--secondary), transparent 30%) 54% 74%, transparent 74%); filter: none; }
  .master-scher .d-hero::after { display: none; }
  .master-scher .d-title { font-size: clamp(56px, 12vw, 140px); line-height: 0.85; letter-spacing: -0.03em; }
  .master-scher .d-nav { border-bottom: 4px solid var(--fg); }
  .master-scher .d-card { border: 2px solid var(--fg); border-radius: 0; background: transparent; }
  .master-scher .d-badge { border-radius: 0; border: 2px solid var(--accent-color); background: var(--accent-color); color: #fff; }
  .master-scher .d-btn, .master-scher .d-cta-btn { border-radius: 0; font-size: 16px; letter-spacing: 0.08em; text-transform: uppercase; }
  .master-scher .d-nav-btn { border-radius: 0; }
  .master-scher .d-gal-item { border-radius: 0; }
  .master-scher .d-card-icon { border-radius: 0; }

  /* ── Carson: deconstructed editorial ── */
  .master-carson .d-hero::before { inset: 0; width: auto; height: auto; right: auto; top: auto; border-radius: 0; background: none; filter: none; }
  .master-carson .d-hero::after { display: none; }
  .master-carson .d-title { transform: rotate(-3deg); letter-spacing: -0.03em; }
  .master-carson .d-subtitle { transform: rotate(1deg); }
  .master-carson .d-nav { border-bottom: none; }
  .master-carson .d-card { border: none; border-radius: 0; background: color-mix(in srgb, var(--secondary), transparent 70%); }
  .master-carson .d-card:nth-child(1) { transform: rotate(-2deg); }
  .master-carson .d-card:nth-child(2) { transform: rotate(1.5deg); background: color-mix(in srgb, var(--accent-color), transparent 80%); }
  .master-carson .d-card:nth-child(3) { transform: rotate(-1deg); }
  .master-carson .d-card-icon { border-radius: 0; opacity: 0.7; }
  .master-carson .d-badge { border-radius: 0; border: none; background: var(--accent-color); color: var(--bg); transform: rotate(-4deg); }
  .master-carson .d-btn, .master-carson .d-cta-btn { border-radius: 0; transform: rotate(-2deg); }
  .master-carson .d-gal-item { border-radius: 0; }

  /* ── Brody: radical type, dark, vertical bars ── */
  .master-brody .d-hero::before { right: 10%; top: 10%; width: 12px; height: 340px; border-radius: 0; background: var(--accent-color); filter: none; box-shadow: -30px 60px 0 var(--secondary), -60px 120px 0 var(--tertiary); }
  .master-brody .d-hero::after { display: none; }
  .master-brody .d-title { font-size: clamp(52px, 10vw, 120px); letter-spacing: -0.02em; }
  .master-brody .d-nav { border-bottom: 2px solid var(--accent-color); }
  .master-brody .d-card { border: 1px solid color-mix(in srgb, var(--fg), transparent 70%); border-radius: 0; background: color-mix(in srgb, var(--fg), transparent 95%); }
  .master-brody .d-card-icon { border-radius: 0; }
  .master-brody .d-badge { border-radius: 0; border-color: var(--accent-color); color: var(--accent-color); }
  .master-brody .d-btn, .master-brody .d-cta-btn { border-radius: 0; background: var(--accent-color); }
  .master-brody .d-nav-btn { border-radius: 0; background: var(--accent-color); }
  .master-brody .d-gal-item { border-radius: 0; }

  /* ── Kare: pixel grid, bitmap ── */
  .master-kare .d-hero::before, .master-kare .d-hero::after { display: none; }
  .master-kare .d-card { border: 2px solid var(--fg); border-radius: 0; background: color-mix(in srgb, var(--fg), transparent 96%); }
  .master-kare .d-card-icon { border-radius: 0; image-rendering: pixelated; box-shadow: 3px 3px 0 var(--accent-color); }
  .master-kare .d-badge { border-radius: 0; border: 2px solid var(--accent-color); }
  .master-kare .d-btn, .master-kare .d-cta-btn, .master-kare .d-nav-btn { border-radius: 0; box-shadow: 3px 3px 0 var(--fg); }
  .master-kare .d-gal-item { border-radius: 0; border: 2px solid var(--fg); }
  .master-kare .d-nav { border-bottom: 2px solid var(--fg); }

  /* ── Greiman: digital collage, transparency layers ── */
  .master-greiman .d-hero::before { inset: 60px 80px 100px 50px; width: auto; height: auto; right: auto; top: auto; border-radius: 0; background: color-mix(in srgb, var(--accent-color), transparent 70%); filter: none; transform: rotate(-6deg); mix-blend-mode: multiply; }
  .master-greiman .d-hero::after { inset: 100px 40px 60px 120px; width: auto; height: auto; left: auto; bottom: auto; border-radius: 0; background: repeating-linear-gradient(0deg, transparent 0 9px, color-mix(in srgb, var(--secondary), transparent 55%) 10px 12px); filter: none; border: 2px solid color-mix(in srgb, var(--secondary), transparent 40%); transform: rotate(5deg); }
  .master-greiman .d-card { border: 2px solid color-mix(in srgb, var(--accent-color), transparent 40%); border-radius: 0; background: color-mix(in srgb, var(--tertiary), transparent 80%); }
  .master-greiman .d-card:nth-child(2) { transform: translateY(-8px); }
  .master-greiman .d-card-icon { border-radius: 0; }
  .master-greiman .d-badge { border-radius: 0; background: var(--accent-color); color: #fff; border-color: var(--accent-color); }
  .master-greiman .d-btn, .master-greiman .d-cta-btn { border-radius: 0; }
  .master-greiman .d-nav-btn { border-radius: 0; }
  .master-greiman .d-gal-item { border-radius: 0; }

  /* ═══ Responsive ═══ */
  @media (max-width: 900px) {
    .d-grid { grid-template-columns: 1fr; }
    .d-stats-grid { grid-template-columns: repeat(2, 1fr); }
    .d-gallery-grid { grid-template-columns: 1fr; grid-template-rows: 200px 200px 200px; }
    .d-gal-item:first-child { grid-row: auto; }
    .d-links { display: none; }
    .d-hero { min-height: 60vh; }
  }
  @media (max-width: 640px) {
    .d-stats-grid { grid-template-columns: 1fr 1fr; gap: 16px; }
    .fab-bar { top: auto; bottom: 20px; }
  }
</style>
</head>
<body>
<div class="demo" id="demo"></div>
<div class="info-overlay" id="info-overlay" onclick="toggleInfo()"></div>
<div class="info-panel" id="info-panel"></div>

<script src="master-data.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const masterId = (params.get("id") || "01").padStart(2, "0");
  const m = window.designMasterData.masters.find(i => i.id === masterId);
  const demo = document.getElementById("demo");

  if (!m) {
    demo.innerHTML = '<div style="padding:80px;text-align:center;font-family:Inter,sans-serif;"><h1>没有找到该大师</h1><p style="margin:16px 0"><a href="masters.html" style="color:#4F46E5">返回大师画廊</a></p></div>';
  } else {
    render(m);
  }

  function render(m) {
    document.title = `${m.id} · ${m.name} — 设计大师方法论`;
    demo.className = `demo ${m.mode}`;
    demo.style.setProperty("--bg", m.bg);
    demo.style.setProperty("--fg", m.fg);
    demo.style.setProperty("--accent-color", m.accent);
    demo.style.setProperty("--secondary", m.secondary);
    demo.style.setProperty("--tertiary", m.tertiary);
    demo.style.setProperty("--display-font", m.font);
    demo.style.setProperty("--title-weight", m.mode === "master-scher" || m.mode === "master-brody" ? 900 : 800);
    demo.style.setProperty("--title-transform", "none");

    const dUrl = `${window.designMasterData.githubBase}${m.file}`;

    demo.innerHTML = `
      <div class="fab-bar">
        <a href="masters.html">← 画廊</a>
        <button onclick="toggleInfo()">ℹ 大师信息</button>
      </div>

      <nav class="d-nav">
        <div class="d-logo">${m.sample}</div>
        <div class="d-links"><span>About</span><span>Features</span><span>Work</span><span>Contact</span></div>
        <div class="d-nav-btn">Get Started</div>
      </nav>

      <section class="d-hero">
        <div class="d-badge">${m.method}</div>
        <h1 class="d-title">${m.sample}</h1>
        <p class="d-subtitle">${m.desc}</p>
        <div class="d-btn">Explore More →</div>
      </section>

      <section class="d-features">
        <h2 class="d-section-title">What We Do</h2>
        <div class="d-grid">
          <div class="d-card">
            <div class="d-card-icon"></div>
            <h3>Design</h3>
            <p>精心打磨每一个视觉细节与交互体验，让美学与功能完美融合。</p>
          </div>
          <div class="d-card">
            <div class="d-card-icon"></div>
            <h3>Build</h3>
            <p>高效搭建稳健可扩展的设计系统，从原型到产品无缝衔接。</p>
          </div>
          <div class="d-card">
            <div class="d-card-icon"></div>
            <h3>Scale</h3>
            <p>无缝适配多端场景与业务增长，让设计随规模不断进化。</p>
          </div>
        </div>
      </section>

      <section class="d-gallery">
        <div class="d-gallery-grid">
          <div class="d-gal-item" style="background:linear-gradient(135deg, var(--accent-color), color-mix(in srgb, var(--secondary), var(--accent-color) 40%));"><div class="d-gal-label">Project Alpha</div></div>
          <div class="d-gal-item" style="background:linear-gradient(135deg, var(--secondary), color-mix(in srgb, var(--tertiary), var(--secondary) 50%));"><div class="d-gal-label">Brand Identity</div></div>
          <div class="d-gal-item" style="background:linear-gradient(135deg, var(--tertiary), color-mix(in srgb, var(--accent-color), var(--tertiary) 40%));"><div class="d-gal-label">Campaign</div></div>
        </div>
      </section>

      <section class="d-stats">
        <div class="d-stats-grid">
          <div><div class="d-stat-val">20</div><div class="d-stat-lbl">Design Masters</div></div>
          <div><div class="d-stat-val">1.2k</div><div class="d-stat-lbl">Principles</div></div>
          <div><div class="d-stat-val">99%</div><div class="d-stat-lbl">Timeless</div></div>
          <div><div class="d-stat-val">∞</div><div class="d-stat-lbl">Influence</div></div>
        </div>
      </section>

      <section class="d-cta">
        <h2>Ready to Learn from the Masters?</h2>
        <div class="d-cta-btn">Start Exploring →</div>
      </section>

      <footer class="d-footer">
        <span>© 2025 ${m.sample}</span>
        <div class="d-footer-links"><span>Terms</span><span>Privacy</span><span>Contact</span></div>
      </footer>
    `;

    // Info panel
    function lc(c) {
      const h = c.replace("#","");
      if (h.length !== 6) return "#fff";
      const r = parseInt(h.slice(0,2),16), g = parseInt(h.slice(2,4),16), b = parseInt(h.slice(4,6),16);
      return (0.2126*r+0.7152*g+0.0722*b)/255 > 0.58 ? "#111" : "#fff";
    }
    const sw = [["Bg",m.bg],["Fg",m.fg],["Accent",m.accent],["2nd",m.secondary],["3rd",m.tertiary]]
      .map(([n,c])=>`<div class="info-sw" style="background:${c}"><span style="color:${lc(c)}">${c}</span></div>`).join("");
    const tg = m.tags.map(t=>`<span class="info-tag">${t}</span>`).join("");
    const pr = m.principles.map(p=>`<div class="info-principle">${p}</div>`).join("");

    document.getElementById("info-panel").innerHTML = `
      <button class="info-close" onclick="toggleInfo()">×</button>
      <div class="info-cat">Master ${m.id} · ${m.category}</div>
      <h2>${m.name}</h2>
      <div class="info-zh">${m.zhName}</div>
      <div class="info-method">${m.method}</div>
      <p class="info-desc">${m.desc}</p>
      <div class="info-work">
        <strong>${m.workTitle}</strong>
        ${m.workBrief}
      </div>
      <div class="info-principles">
        <h4>执行原则</h4>
        ${pr}
      </div>
      <div class="info-swatches">${sw}</div>
      <div class="info-tags">${tg}</div>
      <a class="info-link" href="${dUrl}" target="_blank">查看 DESIGN.md →</a>
      <a class="info-link" href="masters.html" style="background:#666;margin-top:8px;">返回 20 大师画廊</a>
    `;
  }

  function toggleInfo() {
    document.getElementById("info-panel").classList.toggle("open");
    document.getElementById("info-overlay").classList.toggle("open");
  }
</script>
</body>
</html>
